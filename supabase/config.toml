# Generated for the Node project. Edit via `supabase init` or by hand.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "node"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["com.elisafazzari.node://auth-callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = false
enable_confirmations = false

[auth.external.apple]
enabled = true
# client_id, secret set via supabase secrets (production); in development, set in env
# client_id = "com.elisafazzari.node.signin"
# secret = "set via SUPABASE_AUTH_EXTERNAL_APPLE_SECRET"

[functions]
verify_jwt = true

[functions.apple-exchange-code]
verify_jwt = true

[functions.apple-revoke]
verify_jwt = false

[functions.delete-user-data]
verify_jwt = true

[functions.cloudinary-sign]
verify_jwt = true

[functions.report-intake]
verify_jwt = true
